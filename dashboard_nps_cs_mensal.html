// ── Aggregate by driver ───────────────────────────────────
function aggregate(raw) {
  const m = {};
  for (const [d,p,det,s] of raw) {
    if (!m[d]) m[d] = {p:0,d:0,s:0};
    m[d].p += p; m[d].d += det; m[d].s += s;
  }
  return m;
}

const aggApr = aggregate(rawApr);
const aggMar = aggregate(rawMar);
const aggS1  = aggregate(rawS1);
const aggS2  = aggregate(rawS2);
const aggS0  = aggregate(rawS0);

function nps(p,d,s){ return s===0 ? null : (p-d)/s*100; }
function fmt(v,dec=2){ return v===null?'—':(v>=0?'+':'')+v.toFixed(dec)+'%'; }
function fmtN(v,dec=2){ return v===null?'—':v.toFixed(dec)+'%'; }

// Driver lists
const allDrivers  = [...new Set([...Object.keys(aggApr),...Object.keys(aggMar)])].sort();
const weekDrivers = [...new Set([...Object.keys(aggS1),...Object.keys(aggS2)])].sort();

// State
let currentTab    = 'mensal';
let weekComp      = 's1s2';
let currentFilter = 'Todos';

// Active data (set at start of render)
let _aggCurr, _aggPrev, _procCurr, _procPrev, _lCurr, _lPrev, _driversList;

function setTab(t) {
  currentTab = t;
  currentFilter = 'Todos';
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.id === 'tab-'+t));
  document.querySelectorAll('.btn').forEach(b => { if(['Todos','Mature','Meli Pro','Longtail','Buyer','Otros CV'].includes(b.textContent.trim())) b.classList.toggle('active', b.textContent.trim()==='Todos'); });
  render();
}

function setWeekComp(w) {
  weekComp = w;
  document.getElementById('wc-s1s2').classList.toggle('active', w==='s1s2');
  document.getElementById('wc-s0s1').classList.toggle('active', w==='s0s1');
  render();
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.btn').forEach(b => { if(['Todos','Mature','Meli Pro','Longtail','Buyer','Otros CV'].includes(b.textContent.trim())) b.classList.toggle('active', b.textContent.trim()===f); });
  render();
}

function getFiltered() {
  if (currentFilter === 'Todos') return _driversList;
  return _driversList.filter(d => segMap[d] === currentFilter);
}

function render() {
  // ── Set active data based on current tab/comparison ──
  const wcEl = document.getElementById('week-comp');
  const hSub = document.getElementById('header-sub');
  if (currentTab === 'mensal') {
    _aggCurr = aggApr; _aggPrev = aggMar;
    _procCurr = procApr; _procPrev = procMar;
    _lCurr = 'Abril 2026'; _lPrev = 'Março 2026';
    _driversList = allDrivers;
    if (wcEl) wcEl.style.display = 'none';
    if (hSub) hSub.textContent = 'Variação Mensal — Brasil';
  } else {
    _procCurr = {}; _procPrev = {};
    _driversList = weekDrivers;
    if (wcEl) wcEl.style.display = 'flex';
    if (hSub) hSub.textContent = 'Variação Semanal — Brasil';
    if (weekComp === 's1s2') {
      _aggCurr = aggS1; _aggPrev = aggS2;
      _lCurr = '06–12 Abr 2026'; _lPrev = '30 Mar–05 Abr 2026';
    } else {
      _aggCurr = aggS0; _aggPrev = aggS1;
      _lCurr = 'Sem. Atual (13 Abr+)'; _lPrev = '06–10 Abr 2026';
    }
  }
  const bc = document.getElementById('badge-curr'), bp = document.getElementById('badge-prev');
  if (bc) bc.textContent = _lCurr; if (bp) bp.textContent = _lPrev;

  // Update driver table headers
  const short = (l) => l.replace(' 2026','').replace('Abril','Abr').replace('Março','Mar').replace('Sem. Atual (13 Abr+)','Atual');
  const sc = short(_lCurr), sp = short(_lPrev);
  const thC=document.getElementById('th-curr'),thP=document.getElementById('th-prev'),thI=document.getElementById('th-imp'),thS=document.getElementById('th-surv');
  if(thC)thC.textContent=`NPS ${sc}`; if(thP)thP.textContent=`NPS ${sp}`; if(thI)thI.textContent=`Impacto ${sc}`; if(thS)thS.textContent=`Pesquisas ${sc}`;

  const drivers = getFiltered();

  if (drivers.length === 0) {
    document.getElementById('kpis').innerHTML = `<div class="empty-state">Sem dados para o segmento <strong>${currentFilter}</strong> neste período.</div>`;
    document.getElementById('driver-table').innerHTML = `<tr><td colspan="8" class="empty-state">Nenhum driver encontrado.</td></tr>`;
    document.getElementById('gainers').innerHTML = '';
    document.getElementById('decliners').innerHTML = '';
    return;
  }

  // Totals
  let totPA=0,totDA=0,totSA=0,totPM=0,totDM=0,totSM=0;
  for (const d of drivers) {
    const a=_aggCurr[d]||{p:0,d:0,s:0}, m=_aggPrev[d]||{p:0,d:0,s:0};
    totPA+=a.p; totDA+=a.d; totSA+=a.s;
    totPM+=m.p; totDM+=m.d; totSM+=m.s;
  }
  const npsA=nps(totPA,totDA,totSA), npsM=nps(totPM,totDM,totSM);
  const delta = npsA!==null&&npsM!==null ? Math.round((npsA-npsM)*10)/10 : null;

  // KPIs
  const isPos = delta!==null&&delta>=0;
  document.getElementById('kpis').innerHTML = `
    <div class="kpi k-surveys"><label>Pesquisas ${sc}</label><div class="val">${totSA.toLocaleString('pt-BR')}</div><div class="sub">vs ${totSM.toLocaleString('pt-BR')} em ${sp}</div></div>
    <div class="kpi k-apr"><label>NPS ${sc}</label><div class="val" style="font-size:1.5rem">${fmtN(npsA)}</div><div class="sub">período atual</div></div>
    <div class="kpi k-mar"><label>NPS ${sp}</label><div class="val" style="font-size:1.5rem">${fmtN(npsM)}</div><div class="sub">período anterior</div></div>
    <div class="kpi ${isPos?'k-pos':'k-neg'}"><label>Variação</label><div class="val" style="font-size:1.5rem">${fmt(delta)}</div><div class="sub">${sc} vs ${sp}</div></div>`;

  // Driver rows
  const rows = drivers.map(d => {
    const a=_aggCurr[d]||{p:0,d:0,s:0}, m=_aggPrev[d]||{p:0,d:0,s:0};
    const na=nps(a.p,a.d,a.s), nm=nps(m.p,m.d,m.s);
    const dlt = na!==null&&nm!==null ? Math.round((na-nm)*10)/10 : null;
    const impA = totSA>0 ? (a.p-a.d)/totSA*100 : null;
    const impM = totSM>0 ? (m.p-m.d)/totSM*100 : null;
    const dImp = impA!==null&&impM!==null ? impA-impM : null;
    // MIX / NETO decomposition
    const repA = totSA>0 ? a.s/totSA : 0;
    const repM = totSM>0 ? m.s/totSM : 0;
    const impNeto = na!==null&&nm!==null ? repA*(na-nm) : null;
    const impMix  = nm!==null ? (repA-repM)*nm : null;
    return {d,a,m,na,nm,dlt,impA,impM,dImp,impNeto,impMix};
  }).sort((x,y)=>y.a.s-x.a.s);

  document.getElementById('driver-table').innerHTML = rows.map(r=>{
    const seg=segMap[r.d]||'?';
    const dCls  = r.dlt===null?'neutral':r.dlt>=0?'pos':'neg';
    const iCls  = r.impA===null?'neutral':r.impA>=0?'pos':'neg';
    const diCls = r.dImp===null?'neutral':r.dImp>=0?'pos':'neg';
    return `<tr>
      <td>${r.d}</td>
      <td><span class="seg-tag ${segClass[seg]||''}">${seg}</span></td>
      <td class="r">${fmtN(r.na)}</td>
      <td class="r">${fmtN(r.nm)}</td>
      <td class="r ${dCls}">${fmt(r.dlt)}</td>
      <td class="r ${iCls}">${r.impA!==null?fmtN(r.impA):'—'}</td>
      <td class="r ${diCls}">${r.dImp!==null?fmt(r.dImp):'—'}</td>
      <td class="r ${r.impNeto===null?'neutral':r.impNeto>=0?'pos':'neg'}">${r.impNeto!==null?fmt(r.impNeto):'—'}</td>
      <td class="r ${r.impMix===null?'neutral':r.impMix>=0?'pos':'neg'}">${r.impMix!==null?fmt(r.impMix):'—'}</td>
      <td class="r">${r.a.s.toLocaleString('pt-BR')}</td>
    </tr>`;
  }).join('');

  // Gainers/Decliners
  const withDelta = rows.filter(r=>r.dImp!==null&&r.a.s>=5);
  const maxAbs = Math.max(...withDelta.map(r=>Math.abs(r.dImp)),0.01);
  const gainers = [...withDelta].sort((a,b)=>b.dImp-a.dImp).slice(0,7);
  const decliners = [...withDelta].sort((a,b)=>a.dImp-b.dImp).slice(0,7);

  function barHTML(list, isGain) {
    if (!list.length) return '<div class="empty-state" style="padding:20px;font-size:.8rem">Sem dados</div>';
    return list.map(r=>`
      <div class="bar-item">
        <div class="label">
          <span class="name">${r.d}</span>
          <span class="${isGain?'pos':'neg'}">${fmt(r.dImp)} pts</span>
        </div>
        <div class="bar-track">
          <div class="${isGain?'bar-fill-pos':'bar-fill-neg'}" style="width:${Math.abs(r.dImp)/maxAbs*100}%"></div>
        </div>
      </div>`).join('');
  }

  document.getElementById('gainers').innerHTML = barHTML(gainers, true);
  document.getElementById('decliners').innerHTML = barHTML(decliners, false);

  renderExecSummary(rows, npsA, npsM, totSA, totSM, _procCurr, _procPrev, _lCurr, _lPrev);
  renderDeepDive(rows, _procCurr, _procPrev, sc, sp);
  renderWaterfall(_aggCurr, _aggPrev, _driversList, _lCurr, _lPrev);
}

// ── Executive Summary ─────────────────────────────────────
function renderExecSummary(rows, npsA, npsM, totSA, totSM, procCurr, procPrev, lCurr, lPrev) {
  const el = document.getElementById('exec-summary');
  if (!el) return;
  const delta = npsA !== null && npsM !== null ? npsA - npsM : null;

  const withImp = rows.filter(r => r.impNeto !== null && r.a.s >= 5 && r.m.s >= 5);
  if (!withImp.length) { el.innerHTML = ''; return; }

  const topGainer   = [...withImp].sort((a,b) => b.impNeto - a.impNeto)[0];
  const topDecliner = [...withImp].sort((a,b) => a.impNeto - b.impNeto)[0];
  const sameDriver  = topGainer.d === topDecliner.d;

  // ── Target calculations ──────────────────────────────────
  // Impacto vs Target (sem mix) = (surveys_driver_curr / total_surveys_prev) × (NPS_curr − TARGET)
  // Usa surveys atuais do driver mas normaliza pelo total do período anterior,
  // eliminando o efeito de variação do volume total (mix de pool).
  const GLOBAL_TARGET   = 52.5;
  const vsTargetOverall = npsA !== null ? npsA - GLOBAL_TARGET : null;
  const vsTargetG = topGainer && topGainer.na !== null && totSM > 0
    ? (topGainer.a.s / totSM) * (topGainer.na - GLOBAL_TARGET) : null;
  const vsTargetD = topDecliner && !sameDriver && topDecliner.na !== null && totSM > 0
    ? (topDecliner.a.s / totSM) * (topDecliner.na - GLOBAL_TARGET) : null;

  function buildProcTable(driver, driverSurvA, driverSurvM) {
    const pA = procCurr[driver] || {};
    const pM = procPrev[driver] || {};
    const allP = [...new Set([...Object.keys(pA), ...Object.keys(pM)])];
    if (!allP.length) return '<div style="font-size:.73rem;color:#475569;padding:8px 0">Sem dados de processo.</div>';

    const procRows = allP.map(proc => {
      const va = pA[proc]||[0,0,0], vm = pM[proc]||[0,0,0];
      const nA = va[2]>0 ? (va[0]-va[1])/va[2]*100 : null;
      const nM = vm[2]>0 ? (vm[0]-vm[1])/vm[2]*100 : null;
      const iA = driverSurvA>0 ? (va[0]-va[1])/driverSurvA*100 : null;
      const iM = driverSurvM>0 ? (vm[0]-vm[1])/driverSurvM*100 : null;
      const dI = iA!==null&&iM!==null ? iA-iM : null;
      return {proc,va,nA,nM,iA,dI};
    }).filter(r=>r.va[2]>0||((pM[r.proc]||[0,0,0])[2])>0)
      .sort((a,b)=>(b.dI!==null?Math.abs(b.dI):0)-(a.dI!==null?Math.abs(a.dI):0))
      .slice(0,5);

    return `<table class="proc-mini-tbl">
      <thead><tr><th>Processo</th><th class="r">NPS Abr</th><th class="r">NPS Mar</th><th class="r">Δ NPS</th><th class="r">Δ Impacto</th><th class="r">Pesq. Abr</th></tr></thead>
      <tbody>${procRows.map(r=>{
        const dN=r.nA!==null&&r.nM!==null?r.nA-r.nM:null;
        const dCls=dN===null?'neutral':dN>=0?'pos':'neg';
        const iCls=r.dI===null?'neutral':r.dI>=0?'pos':'neg';
        return `<tr>
          <td>${r.proc}</td>
          <td class="r">${r.nA!==null?r.nA.toFixed(1)+'%':'—'}</td>
          <td class="r">${r.nM!==null?r.nM.toFixed(1)+'%':'—'}</td>
          <td class="r ${dCls}">${dN!==null?(dN>=0?'+':'')+dN.toFixed(1)+'p.p.':'—'}</td>
          <td class="r ${iCls}">${r.dI!==null?(r.dI>=0?'+':'')+r.dI.toFixed(2)+'pts':'—'}</td>
          <td class="r">${r.va[2]}</td>
        </tr>`;
      }).join('')}</tbody></table>`;
  }

  const ctx = currentFilter==='Todos' ? 'consolidado CS' : `segmento ${currentFilter}`;
  const dSign = delta!==null&&delta>=0?'+':'';
  const dCls  = delta!==null&&delta>=0?'pos':'neg';

  el.innerHTML = `
  <div class="exec-card">
    <div class="exec-narrative">
      Em <strong>${lCurr}</strong>, o NPS ${ctx} foi de <strong>${fmtN(npsA)}</strong>
      com <strong>${totSA.toLocaleString('pt-BR')}</strong> pesquisas${
      delta!==null
        ? `, representando uma variação de <strong class="${dCls}">${dSign}${delta.toFixed(2)} p.p.</strong>
           frente a <strong>${fmtN(npsM)}</strong> em ${lPrev} (${totSM.toLocaleString('pt-BR')} pesquisas).`
        : '.'
      }${vsTargetOverall!==null
        ? ` Em relação ao target geral (<strong>${GLOBAL_TARGET.toFixed(1)}%</strong>), o NPS está <strong class="${vsTargetOverall>=0?'pos':'neg'}">${vsTargetOverall>=0?'+':''}${vsTargetOverall.toFixed(2)} p.p.</strong>`
        : ''
      }
      ${topGainer ? `O driver com <strong>maior alta de impacto</strong> foi
        <strong>${topGainer.d}</strong> (<span class="pos">${topGainer.impNeto>=0?'+':''}${topGainer.impNeto.toFixed(2)} pts neto</span>)` : ''}${
      topDecliner&&!sameDriver
        ? `, enquanto <strong>${topDecliner.d}</strong> registrou a
           <strong>maior queda</strong> (<span class="neg">${topDecliner.impNeto.toFixed(2)} pts neto</span>).`
        : topGainer ? '.' : ''
      }
    </div>
    <div class="spotlight-row">
      ${topGainer ? `
      <div class="spotlight up">
        <div class="spotlight-header">
          <div class="spotlight-name">▲ ${topGainer.d}</div>
          <div class="spotlight-delta pos">${topGainer.impNeto>=0?'+':''}${topGainer.impNeto.toFixed(2)} pts neto</div>
        </div>
        <div style="font-size:.7rem;color:#64748b;margin-bottom:2px">
          NPS ${fmtN(topGainer.na)} ${lCurr.replace(' 2026','')} vs ${fmtN(topGainer.nm)} ${lPrev.replace(' 2026','')} · <strong style="color:#94a3b8">${topGainer.a.s.toLocaleString('pt-BR')}</strong> pesquisas
        </div>
        ${vsTargetG!==null?`<div style="font-size:.7rem;margin-bottom:6px">
          Target geral <strong style="color:#94a3b8">${GLOBAL_TARGET.toFixed(1)}%</strong> &nbsp;·&nbsp;
          Impacto vs Target <strong class="${vsTargetG>=0?'pos':'neg'}">${vsTargetG>=0?'+':''}${vsTargetG.toFixed(2)} pp</strong>
        </div>`:''}
        ${buildProcTable(topGainer.d, topGainer.a.s, topGainer.m.s)}
      </div>` : ''}
      ${topDecliner&&!sameDriver ? `
      <div class="spotlight down">
        <div class="spotlight-header">
          <div class="spotlight-name">▼ ${topDecliner.d}</div>
          <div class="spotlight-delta neg">${topDecliner.impNeto.toFixed(2)} pts neto</div>
        </div>
        <div style="font-size:.7rem;color:#64748b;margin-bottom:2px">
          NPS ${fmtN(topDecliner.na)} ${lCurr.replace(' 2026','')} vs ${fmtN(topDecliner.nm)} ${lPrev.replace(' 2026','')} · <strong style="color:#94a3b8">${topDecliner.a.s.toLocaleString('pt-BR')}</strong> pesquisas
        </div>
        ${vsTargetD!==null?`<div style="font-size:.7rem;margin-bottom:6px">
          Target geral <strong style="color:#94a3b8">${GLOBAL_TARGET.toFixed(1)}%</strong> &nbsp;·&nbsp;
          Impacto vs Target <strong class="${vsTargetD>=0?'pos':'neg'}">${vsTargetD>=0?'+':''}${vsTargetD.toFixed(2)} pp</strong>
        </div>`:''}
        ${buildProcTable(topDecliner.d, topDecliner.a.s, topDecliner.m.s)}
      </div>` : ''}
    </div>
  </div>`;
}

// ── Deep Dive por Processo ────────────────────────────────
function renderDeepDive(rows, procCurr, procPrev, lCurrShort, lPrevShort) {
  const el = document.getElementById('deepdive');
  if (!el) return;

  el.innerHTML = rows.map((r, idx) => {
    const pA = procCurr[r.d]||{}, pM = procPrev[r.d]||{};
    const allP = [...new Set([...Object.keys(pA), ...Object.keys(pM)])];
    if (!allP.length) return '';

    const procData = allP.map(proc => {
      const va=pA[proc]||[0,0,0], vm=pM[proc]||[0,0,0];
      const nA=va[2]>0?(va[0]-va[1])/va[2]*100:null;
      const nM=vm[2]>0?(vm[0]-vm[1])/vm[2]*100:null;
      const iA=r.a.s>0?(va[0]-va[1])/r.a.s*100:null;
      const iM=r.m.s>0?(vm[0]-vm[1])/r.m.s*100:null;
      const dI=iA!==null&&iM!==null?iA-iM:null;
      const dN=nA!==null&&nM!==null?nA-nM:null;
      return {proc,va,vm,nA,nM,iA,dI,dN};
    }).filter(p=>p.va[2]>0||p.vm[2]>0)
      .sort((a,b)=>b.va[2]-a.va[2]);

    const seg=segMap[r.d]||'?', segCls=segClass[seg]||'';
    const dltCls=r.dlt===null?'neutral':r.dlt>=0?'pos':'neg';

    return `<div class="dd-driver">
      <div class="dd-driver-header" onclick="toggleDD('dd-${idx}')">
        <div class="dd-driver-title">
          <span class="seg-tag ${segCls}">${seg}</span>${r.d}
        </div>
        <div style="display:flex;align-items:center;gap:14px">
          <span class="dd-driver-meta">${r.a.s.toLocaleString('pt-BR')} pesq. Abr</span>
          <span class="${dltCls}" style="font-size:.78rem;font-weight:700">${r.dlt!==null?(r.dlt>=0?'+':'')+r.dlt.toFixed(1)+' p.p.':'—'}</span>
          <span class="dd-chevron" id="chv-dd-${idx}">▼</span>
        </div>
      </div>
      <div class="dd-body" id="dd-${idx}">
        <table class="dd-tbl">
          <thead><tr>
            <th>Processo</th>
            <th class="r">NPS ${lCurrShort||'Atual'}</th><th class="r">NPS ${lPrevShort||'Ant.'}</th><th class="r">Δ NPS</th>
            <th class="r">Impacto ${lCurrShort||'Atual'}</th>
            <th class="r">Δ Impacto</th>
            <th class="r">Pesq. ${lCurrShort||'Atual'}</th>
          </tr></thead>
          <tbody>${procData.map(p=>{
            const dCls=p.dN===null?'neutral':p.dN>=0?'pos':'neg';
            const iCls=p.dI===null?'neutral':p.dI>=0?'pos':'neg';
            return `<tr>
              <td>${p.proc}</td>
              <td class="r">${p.nA!==null?p.nA.toFixed(1)+'%':'—'}</td>
              <td class="r">${p.nM!==null?p.nM.toFixed(1)+'%':'—'}</td>
              <td class="r ${dCls}">${p.dN!==null?(p.dN>=0?'+':'')+p.dN.toFixed(1)+'p.p.':'—'}</td>
              <td class="r ${iCls}">${p.iA!==null?p.iA.toFixed(2)+'pts':'—'}</td>
              <td class="r ${iCls}">${p.dI!==null?(p.dI>=0?'+':'')+p.dI.toFixed(2)+'pts':'—'}</td>
              <td class="r">${p.va[2]}</td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');
}

function toggleDD(id) {
  const body=document.getElementById(id), chv=document.getElementById('chv-'+id);
  if(body){ body.classList.toggle('open'); if(chv) chv.textContent=body.classList.contains('open')?'▲':'▼'; }
}

// ── Waterfall: Contribuição por Segmento ─────────────────
function renderWaterfall(aggCurr, aggPrev, driversList, lCurr, lPrev) {
  const section = document.getElementById('waterfall-section');
  if (!section) return;
  if (currentFilter !== 'Todos') { section.style.display = 'none'; return; }
  section.style.display = '';

  // Totals across ALL drivers in the active list
  let totPA=0,totDA=0,totSA=0,totPM=0,totDM=0,totSM=0;
  for (const d of driversList) {
    const a=aggCurr[d]||{p:0,d:0,s:0}, m=aggPrev[d]||{p:0,d:0,s:0};
    totPA+=a.p; totDA+=a.d; totSA+=a.s; totPM+=m.p; totDM+=m.d; totSM+=m.s;
  }
  const totalA=(totPA-totDA)/totSA*100, totalM=(totPM-totDM)/totSM*100;

  const SEGS=['Longtail','Mature','Buyer','Otros CV','Meli Pro'];

  // delta = (NPS_seg_curr × rep_curr) − (NPS_seg_prev × rep_prev)
  // Σ delta_seg = NPS_curr − NPS_prev
  const segData=SEGS.map(seg=>{
    const drvs=driversList.filter(d=>segMap[d]===seg);
    let pA=0,dA=0,sA=0,pM=0,dM=0,sM=0;
    for(const d of drvs){const a=aggCurr[d]||{p:0,d:0,s:0},m=aggPrev[d]||{p:0,d:0,s:0};pA+=a.p;dA+=a.d;sA+=a.s;pM+=m.p;dM+=m.d;sM+=m.s;}
    const impA=totSA>0?(pA-dA)/totSA*100:0, impM=totSM>0?(pM-dM)/totSM*100:0;
    return{seg,sA,sM,impA,impM,delta:impA-impM,npsA:sA>0?(pA-dA)/sA*100:null,npsM:sM>0?(pM-dM)/sM*100:null};
  }).filter(s=>s.sA>0||s.sM>0); // exclude segments with no data in this period

  // Sort ascending: negatives first, positives last
  const sorted=[...segData].sort((a,b)=>a.delta-b.delta);

  // Auto Y scale based on running cumulative range
  let run=totalM, yLo=totalM, yHi=totalM;
  for(const s of sorted){run+=s.delta;yLo=Math.min(yLo,run);yHi=Math.max(yHi,run);}
  const yMin=Math.floor((Math.min(yLo,totalM)-2)/5)*5;
  const yMax=Math.ceil((Math.max(yHi,totalA)+4)/5)*5;
  const yRange=yMax-yMin;

  const W=720,H=330,pad={t:48,r:50,b:72,l:50};
  const cW=W-pad.l-pad.r, cH=H-pad.t-pad.b;
  const nCols=sorted.length+2; // NPS Março + segs + NPS Abril
  const stepW=cW/nCols;
  const aW=Math.min(68,stepW*0.72);  // anchor bar width
  const bW=Math.min(52,stepW*0.62);  // bridge bar width

  const yS=v=>pad.t+cH-(v-yMin)/yRange*cH;
  const hS=v=>v/yRange*cH;

  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:${W}px;display:block;margin:0 auto">`;

  // Grid lines
  const gStep=yRange<=12?2:5;
  for(let v=Math.ceil(yMin/gStep)*gStep;v<=yMax;v+=gStep){
    const y=yS(v);
    svg+=`<line x1="${pad.l}" x2="${W-pad.r}" y1="${y}" y2="${y}" stroke="#1e293b" stroke-width="1"/>`;
    svg+=`<text x="${pad.l-5}" y="${y+4}" text-anchor="end" font-size="9" fill="#475569" font-family="system-ui">${v}%</text>`;
  }

  // ── NPS Março anchor bar (gray) ──
  const cx0=pad.l+stepW/2, bx0=cx0-aW/2, h0=hS(totalM-yMin);
  svg+=`<rect x="${bx0}" y="${yS(totalM)}" width="${aW}" height="${h0}" fill="#475569" rx="3"/>`;
  svg+=`<text x="${cx0}" y="${yS(totalM)+h0/2+5}" text-anchor="middle" font-size="11" font-weight="800" fill="#e2e8f0" font-family="system-ui">${totalM.toFixed(2)}%</text>`;
  svg+=`<text x="${cx0}" y="${H-pad.b+16}" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="700" font-family="system-ui">NPS ${(lPrev||'Ant.').replace(' 2026','')}</text>`;
  svg+=`<text x="${cx0}" y="${H-pad.b+28}" text-anchor="middle" font-size="8" fill="#475569" font-family="system-ui">${totSM.toLocaleString('pt-BR')} pesq.</text>`;

  // ── Bridge bars (one per segment) ──
  let cum=totalM;
  sorted.forEach((s,i)=>{
    const col=i+1;
    const cx=pad.l+stepW*col+stepW/2, bx=cx-bW/2;
    const isPos=s.delta>=0, color=isPos?'#22c55e':'#ef4444';
    const barLow=Math.min(cum,cum+s.delta), barHigh=Math.max(cum,cum+s.delta);
    const bBarY=yS(barHigh), bBarH=Math.max(hS(barHigh-barLow),3);

    // Connector at current cumulative (before this delta)
    const prevRx=col===1?pad.l+stepW/2+aW/2:pad.l+stepW*(col-1)+stepW/2+bW/2;
    svg+=`<line x1="${prevRx}" x2="${bx}" y1="${yS(cum)}" y2="${yS(cum)}" stroke="#334155" stroke-width="1.2" stroke-dasharray="4,3"/>`;

    svg+=`<rect x="${bx}" y="${bBarY}" width="${bW}" height="${bBarH}" fill="${color}" rx="3"/>`;
    // Label above bar top
    svg+=`<text x="${cx}" y="${bBarY-8}" text-anchor="middle" font-size="9.5" font-weight="700" fill="${color}" font-family="system-ui">${isPos?'+':''}${s.delta.toFixed(2)}%</text>`;
    svg+=`<text x="${cx}" y="${H-pad.b+16}" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="700" font-family="system-ui">${s.seg}</text>`;
    svg+=`<text x="${cx}" y="${H-pad.b+28}" text-anchor="middle" font-size="8" fill="#475569" font-family="system-ui">${s.sA.toLocaleString('pt-BR')} pesq.</text>`;

    cum+=s.delta;
  });

  // Connector to NPS Abril
  const lastRx=pad.l+stepW*sorted.length+stepW/2+bW/2;
  const cxA=pad.l+stepW*(sorted.length+1)+stepW/2, bxA=cxA-aW/2;
  svg+=`<line x1="${lastRx}" x2="${bxA}" y1="${yS(cum)}" y2="${yS(cum)}" stroke="#334155" stroke-width="1.2" stroke-dasharray="4,3"/>`;

  // ── NPS Abril anchor bar (blue) ──
  const hA=hS(totalA-yMin);
  svg+=`<rect x="${bxA}" y="${yS(totalA)}" width="${aW}" height="${hA}" fill="#3b82f6" rx="3"/>`;
  svg+=`<text x="${cxA}" y="${yS(totalA)+hA/2+5}" text-anchor="middle" font-size="11" font-weight="800" fill="#e2e8f0" font-family="system-ui">${totalA.toFixed(2)}%</text>`;
  svg+=`<text x="${cxA}" y="${H-pad.b+16}" text-anchor="middle" font-size="10" fill="#60a5fa" font-weight="700" font-family="system-ui">NPS ${(lCurr||'Atual').replace(' 2026','')}</text>`;
  svg+=`<text x="${cxA}" y="${H-pad.b+28}" text-anchor="middle" font-size="8" fill="#475569" font-family="system-ui">${totSA.toLocaleString('pt-BR')} pesq.</text>`;

  svg+=`</svg>`;

  // Summary table below chart
  const tableRows=[...segData].sort((a,b)=>b.impA-a.impA).map(s=>{
    const d=s.delta, nD=s.npsA!==null&&s.npsM!==null?s.npsA-s.npsM:null;
    return`<tr>
      <td style="padding:7px 12px"><span class="seg-tag ${segClass[s.seg]||''}">${s.seg}</span></td>
      <td style="text-align:right;padding:7px 12px;color:#94a3b8">${s.npsM!==null?s.npsM.toFixed(1)+'%':'—'}</td>
      <td style="text-align:right;padding:7px 12px;color:#e2e8f0;font-weight:700">${s.npsA!==null?s.npsA.toFixed(1)+'%':'—'}</td>
      <td style="text-align:right;padding:7px 12px" class="${nD===null?'neutral':nD>=0?'pos':'neg'}">${nD!==null?(nD>=0?'+':'')+nD.toFixed(1)+'pp':'—'}</td>
      <td style="text-align:right;padding:7px 12px" class="${d>=0?'pos':'neg'}">${d>=0?'+':''}${d.toFixed(2)}pp</td>
    </tr>`;
  }).join('');

  const table=`<table style="width:100%;border-collapse:collapse;font-size:.78rem;margin-top:16px">
    <thead><tr style="border-bottom:1px solid #1e293b">
      <th style="text-align:left;padding:6px 12px;color:#475569;font-size:.63rem;text-transform:uppercase;letter-spacing:.4px">Segmento</th>
      <th style="text-align:right;padding:6px 12px;color:#475569;font-size:.63rem;text-transform:uppercase;letter-spacing:.4px">NPS ${(lPrev||'Ant.').replace(' 2026','')}</th>
      <th style="text-align:right;padding:6px 12px;color:#475569;font-size:.63rem;text-transform:uppercase;letter-spacing:.4px">NPS ${(lCurr||'Atual').replace(' 2026','')}</th>
      <th style="text-align:right;padding:6px 12px;color:#475569;font-size:.63rem;text-transform:uppercase;letter-spacing:.4px">Δ NPS</th>
      <th style="text-align:right;padding:6px 12px;color:#475569;font-size:.63rem;text-transform:uppercase;letter-spacing:.4px">Δ Contrib.</th>
    </tr></thead>
    <tbody>${tableRows}</tbody>
  </table>`;

  document.getElementById('waterfall-chart').innerHTML=`<div style="background:#1e293b;border-radius:12px;padding:18px 20px">${svg}${table}</div>`;
}

render();
</script>
