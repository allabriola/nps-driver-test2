<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { font-family: sans-serif; padding: 20px; }
.tabs { display: flex; gap: 8px; margin-bottom: 20px; }
button { padding: 8px 20px; cursor: pointer; border: 2px solid #333; background: #fff; border-radius: 6px; font-size: 14px; }
button.active { background: #1a1e3c; color: #fff; }
.pane { display: none; padding: 20px; background: #f0f2f5; border-radius: 8px; }
.pane.active { display: block; }
#status { background: #e8f5e9; padding: 10px; margin-bottom: 16px; border-radius: 6px; font-size: 13px; }
</style>
</head>
<body>
<div id="status">Status: JS nao rodou ainda</div>
<div class="tabs">
  <button class="active" onclick="showTab('a', this)">Aba A</button>
  <button onclick="showTab('b', this)">Aba B</button>
  <button onclick="showTab('c', this)">Aba C</button>
</div>
<div id="pane-a" class="pane active">Conteudo da ABA A - NPS: 60.0%</div>
<div id="pane-b" class="pane">Conteudo da ABA B - NPS: 64.1%</div>
<div id="pane-c" class="pane">Conteudo da ABA C - Deep Dive</div>
<script>
document.getElementById("status").textContent = "Status: JS carregou OK";
function showTab(id, btn) {
  document.querySelectorAll(".pane").forEach(function(p) { p.classList.remove("active"); });
  document.querySelectorAll("button").forEach(function(b) { b.classList.remove("active"); });
  document.getElementById("pane-" + id).classList.add("active");
  btn.classList.add("active");
  document.getElementById("status").textContent = "Status: clicou na " + id.toUpperCase() + " (JS OK)";
}
</script>
</body>
</html>
